name: ai-news-platform

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ai_signal}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ai_signal}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ENVIRONMENT: development
      DEBUG: "true"
      HOST: 0.0.0.0
      PORT: "8000"
      CORS_ORIGINS: http://localhost:${WEB_HOST_PORT:-3000},http://127.0.0.1:${WEB_HOST_PORT:-3000}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ai_signal}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
      FRONTEND_BASE_URL: http://localhost:${WEB_HOST_PORT:-3000}
      # Bash-style default: '-' after ':' (see https://docs.docker.com/compose/how-tos/environment-variables/variable-interpolation/)
      FIRST_ADMIN_EMAIL: ${FIRST_ADMIN_EMAIL:-sanjayism@gmail.com}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api/v1
        INTERNAL_API_ORIGIN: http://api:8000
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      # Browser hits same-origin /api/v1; Next rewrites to the api container.
      SERVER_API_URL: http://api:8000/api/v1
      NEXT_PUBLIC_API_URL: /api/v1
      # Canonical URLs, sitemap, OG — must match the port you browse (see WEB_HOST_PORT).
      NEXT_PUBLIC_SITE_URL: http://localhost:${WEB_HOST_PORT:-3000}
    ports:
      - "${WEB_HOST_PORT:-3000}:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
