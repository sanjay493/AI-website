# Deploy to Hostinger **VPS** (or any Linux host with Docker + Compose v2).
# Not suitable for PHP-only/shared hosting — use a VPS with SSH + Docker installed.
#
# GitHub secrets to create (Repository → Settings → Secrets → Actions):
#   VPS_HOST            — IP or hostname
#   VPS_USER            — e.g. root or deploy
#   VPS_SSH_KEY         — private key (pem) with access to the server
#   VPS_DEPLOY_PATH     — absolute path to this repo clone, e.g. /opt/ai-news-platform
#
# On the server (once): install Docker + Compose plugin, clone repo, add `.env.production`
# using `.env.production.example`, enable UFW/firewall for 22/80/443 as needed.

name: Deploy VPS (Hostinger)

# CD: SSH into your Hostinger VPS and rebuild Compose. Uncomment `push` for auto-deploy on main.
on:
  workflow_dispatch:
  # push:
  #   branches: [main, master]

concurrency:
  group: deploy-vps-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_DEPLOY_PATH }}"
            git fetch origin
            git checkout "${{ github.ref_name }}"
            git pull --ff-only origin "${{ github.ref_name }}"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.production pull || true
            docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.production up -d --build --remove-orphans
