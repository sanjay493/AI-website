# Continuous integration: run on every push to main and on pull requests.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-news-platform/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ai-news-platform/backend/requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Pytest
        env:
          REDIS_URL: ""
          ALLOWED_HOSTS: ""
        run: python -m pytest

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-news-platform/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ai-news-platform/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Jest
        run: npm test
