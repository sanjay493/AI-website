name: Deploy VPS (Hostinger)

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
      - master

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push'
        )
      }}

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2

        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}

          script: |
            set -exuo pipefail

            COMPOSE_DIR="${{ secrets.VPS_DEPLOY_PATH }}"
            REPO_ROOT="${{ secrets.VPS_REPO_PATH }}"

            # Trim whitespace / CRLF issues
            COMPOSE_DIR="$(printf '%s' "$COMPOSE_DIR" | sed 's/\r//g;s/^[[:space:]]*//;s/[[:space:]]*$//')"
            REPO_ROOT="$(printf '%s' "$REPO_ROOT" | sed 's/\r//g;s/^[[:space:]]*//;s/[[:space:]]*$//')"

            # If repo root not provided, use compose dir
            if [ -z "${REPO_ROOT:-}" ]; then
              REPO_ROOT="$COMPOSE_DIR"
            fi

            REF_NAME='${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}'

            echo "Deploy: REPO_ROOT=$REPO_ROOT"
            echo "Deploy: COMPOSE_DIR=$COMPOSE_DIR"
            echo "Deploy: REF_NAME=$REF_NAME"

            # Validate paths
            test -n "$COMPOSE_DIR" || {
              echo "Missing secret VPS_DEPLOY_PATH"
              exit 1
            }

            test -d "$REPO_ROOT/.git" || {
              echo "Not a git repo: $REPO_ROOT"
              echo "Set VPS_REPO_PATH correctly"
              exit 1
            }

            test -f "$COMPOSE_DIR/docker-compose.yml" || {
              echo "docker-compose.yml not found in $COMPOSE_DIR"
              ls -la "$COMPOSE_DIR" || true
              exit 1
            }

            # Pull latest code
            cd "$REPO_ROOT"

            git fetch origin --prune
            git checkout -B "$REF_NAME" "origin/$REF_NAME"

            # Move to deployment directory
            cd "$COMPOSE_DIR"

            test -f .env.production || {
              echo "Missing .env.production in $COMPOSE_DIR"
              echo "Create it on server manually."
              exit 1
            }

            echo "Pulling latest images..."
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              --env-file .env.production \
              pull || true

            echo "Cleaning old Docker cache..."
            docker builder prune -af || true

            echo "Stopping old containers..."
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              --env-file .env.production \
              down || true

            echo "Building fresh containers..."
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              --env-file .env.production \
              build --no-cache

            echo "Starting containers..."
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              --env-file .env.production \
              up -d --remove-orphans

            echo "Deployment completed successfully."