# Deploy to Hostinger **VPS** (or any Linux host with Docker + Compose v2).
#
# GitHub secrets (Repository → Settings → Secrets → Actions → New repository secret):
#   VPS_HOST        — SSH host (e.g. 45.195.159.159)
#   VPS_USER        — SSH user (e.g. root)
#   VPS_SSH_KEY     — Private key PEM (full file contents)
#   VPS_DEPLOY_PATH — Directory that contains docker-compose.yml, e.g. /opt/AI-website/ai-news-platform
#   VPS_REPO_PATH   — (Optional) Git repo root containing .git, e.g. /opt/AI-website
#                     Omit if clone root is the same folder as VPS_DEPLOY_PATH.
#
# On the server (once): Docker, clone repo, .env.production, Nginx on 80/443 (see deploy/nginx/*.example).

name: Deploy VPS (Hostinger)

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [main, master]

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >-
      ${{ github.event_name == 'workflow_dispatch'
      || (github.event.workflow_run.conclusion == 'success'
          && github.event.workflow_run.event == 'push') }}
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            COMPOSE_DIR="${{ secrets.VPS_DEPLOY_PATH }}"
            REPO_ROOT="${{ secrets.VPS_REPO_PATH }}"
            if [ -z "${REPO_ROOT:-}" ]; then
              REPO_ROOT="$COMPOSE_DIR"
            fi
            REF_NAME='${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}'
            cd "$REPO_ROOT"
            git fetch origin
            git checkout "$REF_NAME"
            git pull --ff-only origin "$REF_NAME"
            cd "$COMPOSE_DIR"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.production pull || true
            docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.production up -d --build --remove-orphans
