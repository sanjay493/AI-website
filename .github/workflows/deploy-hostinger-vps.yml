# Deploy to Hostinger **VPS** (or any Linux host with Docker + Compose v2).
#
# GitHub secrets (Repository → Settings → Secrets → Actions → New repository secret):
#   VPS_HOST        — SSH host (e.g. 45.195.159.159)
#   VPS_USER        — SSH user (e.g. root)
#   VPS_SSH_KEY     — Private key PEM (full file contents)
#   VPS_DEPLOY_PATH — Absolute path — directory that contains docker-compose.yml, e.g.
#                     /opt/AI-website/ai-news-platform — no trailing space or newline.
#   VPS_REPO_PATH   — (Optional) Git repo root containing .git, e.g. /opt/AI-website
#                     Omit if clone root is the same folder as VPS_DEPLOY_PATH.
#
# On the server (once): Docker, clone repo, .env.production, Nginx on 80/443 (see deploy/nginx/*.example).

name: Deploy VPS (Hostinger)

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [main, master]

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >-
      ${{ github.event_name == 'workflow_dispatch'
      || (github.event.workflow_run.conclusion == 'success'
          && github.event.workflow_run.event == 'push') }}
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -exuo pipefail
            COMPOSE_DIR="${{ secrets.VPS_DEPLOY_PATH }}"
            REPO_ROOT="${{ secrets.VPS_REPO_PATH }}"
            # Trim leading/trailing whitespace and CR (incorrect bash `#%%` trims broke paths with no spaces)
            COMPOSE_DIR="$(printf '%s' "$COMPOSE_DIR" | sed 's/\r//g;s/^[[:space:]]*//;s/[[:space:]]*$//')"
            REPO_ROOT="$(printf '%s' "$REPO_ROOT" | sed 's/\r//g;s/^[[:space:]]*//;s/[[:space:]]*$//')"
            if [ -z "${REPO_ROOT:-}" ]; then REPO_ROOT="$COMPOSE_DIR"; fi
            REF_NAME='${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}'
            echo "Deploy: REPO_ROOT=$REPO_ROOT COMPOSE_DIR=$COMPOSE_DIR REF_NAME=$REF_NAME"
            test -n "$COMPOSE_DIR" || { echo 'Missing secret VPS_DEPLOY_PATH'; exit 1; }
            test -d "$REPO_ROOT/.git" || { echo "Not a git repo: $REPO_ROOT (set VPS_REPO_PATH to folder containing .git)"; exit 1; }
            test -f "$COMPOSE_DIR/docker-compose.yml" || {
              echo "No docker-compose.yml in VPS_DEPLOY_PATH=$COMPOSE_DIR"
              ls -la "$COMPOSE_DIR" || true
              exit 1
            }
            cd "$REPO_ROOT"
            git fetch origin --prune
            git checkout -B "$REF_NAME" "origin/$REF_NAME"
            cd "$COMPOSE_DIR"
            test -f .env.production || { echo "Missing .env.production in COMPOSE_DIR (create on server, never commit)"; exit 1; }
            docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.production pull || true
            docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.production up -d --build --remove-orphans
